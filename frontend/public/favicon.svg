<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <defs>
    <linearGradient id="sg" x1="50" y1="0" x2="50" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="50%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Diagonais internas -->
  <g stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="50" y1="10" x2="24" y2="55"/>
    <line x1="24" y1="25" x2="50" y2="70"/>
    <line x1="50" y1="40" x2="76" y2="85"/>
    <line x1="76" y1="55" x2="50" y2="100"/>
  </g>

  <!-- Arestas do S -->
  <g stroke="url(#sg)" stroke-width="4.5" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="24" y1="25" x2="50" y2="10"/>
    <line x1="50" y1="10" x2="76" y2="25"/>
    <line x1="50" y1="70" x2="24" y2="55"/>
    <line x1="24" y1="55" x2="24" y2="25"/>
    <line x1="24" y1="55" x2="50" y2="40"/>
    <line x1="50" y1="40" x2="76" y2="55"/>
    <line x1="76" y1="55" x2="76" y2="85"/>
    <line x1="76" y1="85" x2="50" y2="100"/>
  </g>

  <!-- Nós -->
  <circle cx="50"  cy="10"  r="7.5" fill="#06B6D4"/>
  <circle cx="76"  cy="25"  r="6.5" fill="#1BADD4"/>
  <circle cx="24"  cy="25"  r="6.5" fill="#1BADD4"/>
  <circle cx="50"  cy="40"  r="7"   fill="#4F72F0"/>
  <circle cx="24"  cy="55"  r="8"   fill="#6366F1"/>
  <circle cx="76"  cy="55"  r="6.5" fill="#6B68F2"/>
  <circle cx="50"  cy="70"  r="7"   fill="#7C5CF4"/>
  <circle cx="76"  cy="85"  r="6.5" fill="#9055F5"/>
  <circle cx="50"  cy="100" r="7.5" fill="#A855F7"/>
</svg>
